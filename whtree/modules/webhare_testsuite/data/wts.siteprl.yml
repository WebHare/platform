typeGroup: global
types:
  generic_test_type: # webhare_testsuite:global.generic_test_type
    title: WTS Generic
    members:
      str:
        type: string
      emptyStr:
        type: string
      int:
        type: integer
      blub:
        type: file
      blubImg:
        type: file
        constraints:
          accept:
            - bitmap
      price:
        type: money
      rich:
        type: richdocument
        layout: section
      yesNo:
        type: boolean
      aFloat:
        type: float
      aDateTime:
        type: datetime
      aDay:
        type: date
      anInstance:
        type: instance
      strArray:
        type: stringarray
      url:
        type: url
      aRecord:
        type: hson
      aDoc:
        type: compoundDocument
      aHTMLDoc:
        type: compoundHTMLDocument
      aForm:
        type: formDefinition
      aTypedRecord:
        type: record
        members:
          richMember:
            type: richdocument
          intMember:
            type: integer
          aWhfsRef:
            type: whfsref
      anUntypedRecord:
        type: json
      anArray:
        type: array
        members:
          richMember:
            type: richdocument
          form:
            type: formDefinition
          intMember:
            type: integer
          aWhfsRef:
            type: whfsref
          aSubArray:
            type: array
            members:
              subRichMember:
                type: richdocument
              subIntMember:
                type: integer
      myWhfsRef:
        type: whfsref
      myWhfsRefArray:
        type: whfsrefarray
      myLink:
        type: intextlink

  type_clone_never:
    clone: never
    members:
      neverString:
        type: string

  type_clone_ondraft:
    clone: onDraft
    members:
      onDraftString:
        type: string

  type_clone_ondraft2: # we need a second onDraft type to test adding types during version history
    clone: onDraft
    members:
      onDraftString2:
        type: string

  type_clone_oncopy:
    clone: onCopy # the default, btw
    members:
      onCopyString:
        type: string
