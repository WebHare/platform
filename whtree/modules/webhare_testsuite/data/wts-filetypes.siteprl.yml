types:
  base_test.testsuite_rtd_ts: # Forced use of the JS renderer
    metaType: page
    workflow: true
    apply:
      bodyRenderer:
        contentBuilder: mod::platform/js/pagebuilders/richdocument.ts#renderRTD

  base_test.testsuite_rtd_hs: # Forced use of the HS renderer
    metaType: page
    workflow: true
    apply:
      bodyRenderer:
        objectName: mod::publisher/lib/internal/renderers/rtd.whlib#RenderRTD

  base_test.dynamic_page:
    metaType: page
    workflow: false
    title: WTS JS dynamic page
    dynamicExecution:
      contentBuilder: mod::webhare_testsuite/webdesigns/basetestjs/pages/jsrendered.ts#renderDynamicPage

  wrdauth.testpage:
    metaType: page
    workflow: false
    title: WRD Auth Test Page
    dynamicExecution:
      contentBuilder: mod::webhare_testsuite/webdesigns/basetestjs/pages/jsrendered.ts#renderAuthTestPage

apply:
  - comment: Configure widgets. We need this rule so basetest webdesign can also run base_test.testsuite_rtd_ts files
    to:
      all
    setWidget:
      "http://www.webhare.net/xmlns/webhare_testsuite/rtd/widgetblock":
        widgetBuilder: mod::webhare_testsuite/webdesigns/basetestjs/webdesign/webdesign.ts#renderWidgetBlock
  - to:
      type: http://www.webhare.net/xmlns/webhare_testsuite/dynamicpage
      whfsPath: "*/dynamicpage-override-js"
    bodyRenderer:
      contentBuilder: mod::webhare_testsuite/webdesigns/basetestjs/pages/jsrendered.ts#renderDynamicPage
  - to:
      type: http://www.webhare.net/xmlns/webhare_testsuite/dynamicpage
      whfsPath: "*/dynamicpage-override-hs"
    bodyRenderer:
      objectName: mod::webhare_testsuite/webdesigns/basetest/pages/basetestpages.whlib#DynamicPageOverride
